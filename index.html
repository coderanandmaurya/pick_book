<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Library</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #2c3e50;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 24px;
    }

    .search-bar {
      text-align: center;
      margin: 20px;
    }

    .search-bar input {
      width: 60%;
      padding: 10px;
      font-size: 16px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    .library {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .book {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
    }

    .book img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-radius: 5px;
    }

    .book h3 {
      margin: 10px 0 5px;
    }

    .book p {
      font-size: 14px;
      color: #555;
    }
  </style>
</head>

<body>

<header>
  📚 My Book Library
</header>

<div class="search-bar">
  <input type="text" placeholder="Search books...">
</div>

<div class="library">
  <div class="book">
    <img src="https://via.placeholder.com/200x250" alt="Book">
    <h3>Machine Learning Basics</h3>
    <p>Author: John Doe</p>
  </div>

  <div class="book">
    <img src="https://via.placeholder.com/200x250" alt="Book">
    <h3>Deep Learning Guide</h3>
    <p>Author: Jane Smith</p>
  </div>

  <div class="book">
    <img src="https://via.placeholder.com/200x250" alt="Book">
    <h3>Data Science Handbook</h3>
    <p>Author: Andrew Ng</p>
  </div>

  <div class="book">
    <img src="https://via.placeholder.com/200x250" alt="Book">
    <h3>AI for Beginners</h3>
    <p>Author: Alex Johnson</p>
  </div>
</div>

<!-- Watson Assistant Chat Integration -->
<script>
  window.watsonAssistantChatOptions = {
    integrationID: "23af220c-b2f3-4111-8659-2202271837ad",
    region: "eu-de",
    serviceInstanceID: "90983dd9-a875-4dd4-b455-b4631cbb3066",
    onLoad: async (instance) => { await instance.render(); }
  };

  setTimeout(function(){
    const t = document.createElement('script');
    t.src = "https://web-chat.global.assistant.watson.appdomain.cloud/versions/" +
            (window.watsonAssistantChatOptions.clientVersion || 'latest') +
            "/WatsonAssistantChatEntry.js";
    document.head.appendChild(t);
  });
</script>

</body>
</html>
